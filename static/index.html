<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complexity Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #111;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-row label {
      font-size: 13px;
      color: #555;
    }

    select {
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #111;
      cursor: pointer;
    }

    .editor-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
    }

    .editor-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }

    .editor-bar span {
      font-size: 12px;
      color: #888;
      font-family: monospace;
    }

    .clear-btn {
      font-size: 12px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
    }

    .clear-btn:hover { color: #333; }

    textarea {
      width: 100%;
      min-height: 220px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 14px;
      border: none;
      outline: none;
      resize: vertical;
      background: #fff;
      color: #111;
    }

    .examples-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .examples-label {
      font-size: 12px;
      color: #888;
    }

    .ex-btn {
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid #ddd;
      border-radius: 999px;
      background: #fff;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
    }

    .ex-btn:hover {
      border-color: #aaa;
      color: #111;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .analyze-btn {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .analyze-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .status {
      font-size: 13px;
      color: #888;
    }

    .error-box {
      background: #fff0f0;
      border: 1px solid #f5c2c2;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #c0392b;
      display: none;
    }

    .result-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.5rem;
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .metric {
      background: #f7f7f7;
      border-radius: 8px;
      padding: 14px;
    }

    .metric-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 600;
      font-family: monospace;
      color: #111;
    }

    .metric-sub {
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .badge-green { background: #e6f4ea; color: #276834; }
    .badge-blue  { background: #e8f0fe; color: #1a56a0; }
    .badge-amber { background: #fef3e2; color: #8a5c00; }
    .badge-red   { background: #fce8e8; color: #a32d2d; }

    .verdict-box {
      background: #f7f7f7;
      border-radius: 8px;
      padding: 14px;
      grid-column: 1 / -1;
    }

    .verdict-text {
      font-size: 13px;
      color: #333;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .explanation {
      font-size: 13px;
      color: #333;
      line-height: 1.7;
    }

    .breakdown {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .breakdown-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .breakdown-tag {
      font-size: 11px;
      font-family: monospace;
      background: #f0f0f0;
      color: #444;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .breakdown-desc {
      font-size: 13px;
      color: #333;
      line-height: 1.5;
    }

    .tip-box {
      background: #f0f7ff;
      border-left: 3px solid #4a90d9;
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      font-size: 13px;
      color: #1a3a5c;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div>
        <div class="title">Complexity Analyzer</div>
        <div class="subtitle">Paste code → get Big-O time and space complexity</div>
      </div>
      <div class="lang-row">
        <label>Language</label>
        <select id="lang">
          <option>C++</option>
          <option>Python</option>
          <option>Java</option>
          <option>JavaScript</option>
        </select>
      </div>
    </div>

    <div class="editor-card">
      <div class="editor-bar">
        <span>code snippet</span>
        <button class="clear-btn" onclick="clearAll()">clear</button>
      </div>
      <textarea id="code" placeholder="Paste your code here..."></textarea>
    </div>

    <div class="examples-row">
      <span class="examples-label">Try an example:</span>
      <button class="ex-btn" onclick="loadExample('binary')">Binary search</button>
      <button class="ex-btn" onclick="loadExample('bubble')">Bubble sort</button>
      <button class="ex-btn" onclick="loadExample('dfs')">DFS</button>
      <button class="ex-btn" onclick="loadExample('fib')">Fibonacci DP</button>
    </div>

    <div class="btn-row">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze</button>
      <span class="status" id="status"></span>
    </div>

    <div class="error-box" id="error"></div>

    <div class="result-card" id="result">
      <div class="metrics" id="metrics"></div>
      <div class="divider"></div>
      <div>
        <div class="section-label">Explanation</div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="section-label">Line-by-line breakdown</div>
        <div class="breakdown" id="breakdown"></div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="section-label">Optimization tip</div>
        <div class="tip-box" id="tip"></div>
      </div>
    </div>

  </div>

  <script>
    const examples = {
      binary: {
        lang: "C++",
        code: `int binarySearch(vector<int>& arr, int target) {
    int lo = 0, hi = arr.size() - 1;
    while (lo <= hi) {
        int mid = lo + (hi - lo) / 2;
        if (arr[mid] == target) return mid;
        else if (arr[mid] < target) lo = mid + 1;
        else hi = mid - 1;
    }
    return -1;
}`
      },
      bubble: {
        lang: "C++",
        code: `void bubbleSort(vector<int>& arr) {
    int n = arr.size();
    for (int i = 0; i < n - 1; i++)
        for (int j = 0; j < n - i - 1; j++)
            if (arr[j] > arr[j+1])
                swap(arr[j], arr[j+1]);
}`
      },
      dfs: {
        lang: "C++",
        code: `void dfs(int node, vector<vector<int>>& adj, vector<bool>& vis) {
    vis[node] = true;
    for (int nb : adj[node])
        if (!vis[nb]) dfs(nb, adj, vis);
}`
      },
      fib: {
        lang: "Python",
        code: `def fib(n):
    dp = [0] * (n + 1)
    dp[1] = 1
    for i in range(2, n + 1):
        dp[i] = dp[i-1] + dp[i-2]
    return dp[n]`
      }
    };

    function loadExample(key) {
      const ex = examples[key];
      document.getElementById("code").value = ex.code;
      document.getElementById("lang").value = ex.lang;
    }

    function clearAll() {
      document.getElementById("code").value = "";
      document.getElementById("result").style.display = "none";
      document.getElementById("error").style.display = "none";
      document.getElementById("status").textContent = "";
    }

    function badgeClass(complexity) {
      const c = complexity.toLowerCase();
      if (c.includes("o(1)") || c.includes("o(log")) return "badge-green";
      if (c.includes("o(n log") || c.includes("o(n)")) return "badge-blue";
      if (c.includes("o(n^2)") || c.includes("o(n²)") || c.includes("o(n*m)")) return "badge-amber";
      return "badge-red";
    }

    async function analyze() {
      const code = document.getElementById("code").value.trim();
      const language = document.getElementById("lang").value;

      if (!code) {
        document.getElementById("status").textContent = "Paste some code first.";
        return;
      }

      const btn = document.getElementById("analyzeBtn");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const errorEl = document.getElementById("error");

      btn.disabled = true;
      statusEl.textContent = "Analyzing...";
      resultEl.style.display = "none";
      errorEl.style.display = "none";

      try {
        const res = await fetch("http://localhost:5000/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, language })
        });

        const data = await res.json();

        if (data.error) {
          errorEl.textContent = "Error: " + data.error;
          errorEl.style.display = "block";
          btn.disabled = false;
          statusEl.textContent = "";
          return;
        }

        document.getElementById("metrics").innerHTML = `
          <div class="metric">
            <div class="metric-label">Time complexity</div>
            <div class="metric-value">${data.time_complexity}</div>
            <div class="metric-sub">
              <span class="badge ${badgeClass(data.time_complexity)}">${data.time_case} case</span>
            </div>
          </div>
          <div class="metric">
            <div class="metric-label">Space complexity</div>
            <div class="metric-value">${data.space_complexity}</div>
          </div>
          <div class="verdict-box">
            <div class="metric-label">Verdict</div>
            <div class="verdict-text">${data.short_verdict}</div>
          </div>
        `;

        document.getElementById("explanation").textContent = data.explanation;

        document.getElementById("breakdown").innerHTML = data.breakdown.map(b => `
          <div class="breakdown-item">
            <span class="breakdown-tag">${b.line}</span>
            <span class="breakdown-desc">${b.contribution}</span>
          </div>
        `).join("");

        document.getElementById("tip").textContent = data.optimization_tip;

        resultEl.style.display = "flex";
        statusEl.textContent = "";

      } catch (err) {
        errorEl.textContent = "Could not connect to server. Make sure server.py is running on port 5000.";
        errorEl.style.display = "block";
        statusEl.textContent = "";
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
